<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            background-color: purple;
            width: 300px;
            height: 150px;
            text-align: center;
            border: 1px solid black;
            border-radius: 10px;
            padding: 20px;
            margin: 20px;
            box-sizing: border-box;
     }
        p{
            border-bottom: 2px double white;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <p>Hello Guys</p>
    </div>
    <div class="box">
        <p>Books</p>
    </div>
    
</body>
</html>

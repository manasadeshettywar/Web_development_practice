<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Snack Express</title>
    <style>
         body{
      background: #ffd7a8;
    }

    .banner{
      width:100%;
      min-height:100vh;
      background:linear-gradient(to right, black, black);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px;
    }

    .left{
      min-width:250px;
    }

    .left h3{
      color: white;
      font-size:22px;
      margin-bottom:10px;
    }

    .left h1{
      font-size:55px;
      color: yellow;
      margin-bottom:20px;
      line-height:1.2;
    }

    .left p{
      font-size:18px;
      color:#9a7a7a;
      line-height:1.6;
      margin-bottom:25px;
      max-width:500px;
    }

    .buttons{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    .buttons a{
      text-decoration:none;
      padding:14px 28px;
      border-radius:30px;
      font-size:16px;
      font-weight:bold;
      transition:0.3s;
    }

    .order-btn{
      background: rgb(89, 96, 137);
      color:white;
    }

    .order-btn:hover{
      background: black;
    }

    .menu-btn{
      border:2px solid rgb(89, 93, 117);
      color: rgb(100, 100, 150);
      background:white;
    }

    .menu-btn:hover{
      background: black;
      color:white;
    }

    .right{
      min-width:300px;
      text-align:center;
    }

    .right img{
      width:100%;
      max-width:500px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.15);
    }


      .left h1{
        font-size:38px;
      }

      .left p{
        margin-left:auto;
        margin-right:auto;
      }

      .buttons{
        justify-content:center;
      }
    

    </style>
</head>
<body>
    <div class="banner">
        <div class="left">
            <h3>Campus Snack Express</h3>
            <h1>Snacks for Busy Students!</h1>
            <p>Enjoy quick bites, tasty combos, and cool drinks anytime around your campus.</p>
            <div class="button">
                <a href="#" class="order-btn">Oreder Now</a>
                    <a href="#" class="menu-btn">view Menu</a>
            </div>
        </div>
        <div class="right">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT2O5plZzrPG1blL-kcbSYIFw_3sFPDgj0FyV6s0Gb6ag&s=10" alt="Welcome to our snack menu">
        </div>
    </div>
    
</body>
</html>

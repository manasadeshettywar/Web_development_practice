<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: aqua;
            width: 150px;
            height: 150px;
            text-align: center;
        }
        div:hover{
            background-color: red;
            color: white;
            transition: 2sec;

        }
        #box{
            background-color: red;
            height: 100px;
            width: 100px;
        }

        #box:hover{
            transform: rotate(90deg);
            transition: 2sec;
            
        }
    </style>
</head>
<body>
    <div>
        <h1>Manasa</h1>
        <p>Full stack Developer</p>
    </div>
    <ul>
        <li>python</li>
        <li>Css</li>
        
    </ul>
    <p>profile card</p>
    <div id="box">Hi</div>
    </div>
    
</body>
</html>
